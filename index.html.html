/* === Ukládání do zařízení (IndexedDB) — stejné rozhraní jako window.storage === */
const storage = (() => {
  const DBN = 'laundrycloud', STORE = 'kv';
  function open() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(DBN, 1);
      r.onupgradeneeded = () => { r.result.createObjectStore(STORE); };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function run(mode, op) {
    const db = await open();
    return new Promise((res, rej) => {
      const t = db.transaction(STORE, mode);
      const s = t.objectStore(STORE);
      const req = op(s);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  return {
    async get(key) {
      const v = await run('readonly', s => s.get(key));
      return (v === undefined || v === null) ? null : { key, value: v };
    },
    async set(key, value) {
      await run('readwrite', s => s.put(value, key));
      return { key, value };
    },
    async delete(key) {
      await run('readwrite', s => s.delete(key));
      return { key, deleted: true };
    },
    async list(prefix = '') {
      const keys = await run('readonly', s => s.getAllKeys());
      return { keys: (keys || []).map(String).filter(k => k.startsWith(prefix)), prefix };
    },
  };
})();

// === Konstanty ===
const COMPANY_EMAIL = 'Dvoracekroman@gmail.com';
const TECHNICIAN_NAME = 'Roman Dvořáček';
const COMPANY_NAME = 'Laundry Cloud s.r.o.';

// === Pomocné funkce ===
const todayISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
};

const formatCZ = (iso) => {
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  return `${parseInt(parts[2])}.${parseInt(parts[1])}.${parts[0]}`;
};

const formatDateTimeCZ = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getDate()}.${d.getMonth() + 1}.${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

const compactDate = (iso) => (iso || todayISO()).replace(/-/g, '');

const generateProtocolNumber = async () => {
  const date = compactDate(todayISO());
  try {
    const result = await storage.list(`protocols:SP-${date}-`);
    const keys = result?.keys || [];
    let max = 0;
    keys.forEach(k => {
      const m = k.match(/-(\d+)$/);
      if (m) max = Math.max(max, parseInt(m[1]));
    });
    return `SP-${date}-${String(max + 1).padStart(2, '0')}`;
  } catch {
    return `SP-${date}-01`;
  }
};

// Kontrola platnosti IČO: 8 číslic + kontrolní číslice (mod 11)
const validIco = (ico) => {
  if (!/^\d{8}$/.test(ico)) return false;
  const d = ico.split('').map(Number);
  let sum = 0;
  for (let i = 0; i < 7; i++) sum += d[i] * (8 - i);
  const mod = sum % 11;
  let check;
  if (mod === 0) check = 1;
  else if (mod === 1) check = 0;
  else check = 11 - mod;
  return check === d[7];
};

// Načtení firemních údajů z ARES podle IČO (přímé volání API)
const fetchAres = async (ico) => {
  const res = await fetch(`https://ares.gov.cz/ekonomicke-subjekty-v-be/rest/ekonomicke-subjekty/${ico}`);
  if (res.status === 404) return { notFound: true };
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  return {
    customer: data.obchodniJmeno || '',
    address: data.sidlo?.textovaAdresa || '',
    dic: data.dic || '',
    city: data.sidlo?.nazevObce || '',
  };
};

// Záložní načtení přes vyhledávání (když prostředí blokuje přímé volání ARES)
const fetchAresFallback = async (ico) => {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `Vyhledej v českém registru ARES (ares.gov.cz) firmu s IČO ${ico}. Vrať POUZE validní JSON bez dalšího textu a bez markdown ohraničení, ve formátu {"obchodniJmeno":"přesný oficiální název","adresa":"úplná adresa sídla včetně PSČ a města"}. Pokud subjekt s tímto IČO neexistuje, vrať {"notFound":true}.`
      }],
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
    }),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const match = text.replace(/```json|```/g, '').match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Nečitelná odpověď');
  const parsed = JSON.parse(match[0]);
  if (parsed.notFound) return { notFound: true };
  return { customer: parsed.obchodniJmeno || '', address: parsed.adresa || '' };
};

const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1200;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = reject;
    img.src = e.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const blankProtocol = () => ({
  id: null,
  status: 'draft',
  createdAt: new Date().toISOString(),
  closedAt: null,
  customer: '', ico: '', customerAddress: '', deliveryPlace: '',
  contactPerson: '', phone: '', email: '', deliveryDate: todayISO(),
  manufacturer: '', model: '', serialNumber: '', year: '', power: '', capacity: '',
  serviceDate: todayISO(), technician: TECHNICIAN_NAME, workHours: '', travelKm: '',
  workDescription: '',
  parts: [],
  trainingDone: false, trainingScope: '', trainingDate: '',
  trainedPersons: [],
  customerSignatureName: '',
  supplierSignature: '', customerSignature: '',
  photosBefore: [], photosAfter: [],
});

// === Hlavní aplikace ===
function App() {
  const [view, setView] = useState('list');
  const [protocols, setProtocols] = useState([]);
  const [loading, setLoading] = useState(true);
  const [current, setCurrent] = useState(null);
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState(null);

  useEffect(() => { loadProtocols(); }, []);

  const loadProtocols = async () => {
    setLoading(true);
    try {
      const result = await storage.list('protocols:');
      const keys = result?.keys || [];
      const items = await Promise.all(keys.map(async (k) => {
        try {
          const r = await storage.get(k);
          return JSON.parse(r.value);
        } catch { return null; }
      }));
      setProtocols(items.filter(Boolean).sort((a, b) =>
        (b.createdAt || '').localeCompare(a.createdAt || '')
      ));
    } catch (e) {
      console.error('Načtení selhalo:', e);
    }
    setLoading(false);
  };

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const handleNew = async () => {
    const p = blankProtocol();
    p.id = await generateProtocolNumber();
    setCurrent(p);
    setView('form');
  };

  const handleOpen = (protocol) => {
    setCurrent(protocol);
    setView('form');
  };

  const handleSave = async (protocol) => {
    try {
      await storage.set(`protocols:${protocol.id}`, JSON.stringify(protocol));
      showToast('Uloženo');
      await loadProtocols();
      setCurrent(protocol);
      return true;
    } catch (e) {
      showToast('Uložení selhalo: ' + (e.message || 'neznámá chyba'), 'error');
      return false;
    }
  };

  const handleClose = async (protocol) => {
    const closed = { ...protocol, status: 'closed', closedAt: new Date().toISOString() };
    const ok = await handleSave(closed);
    if (ok) setCurrent(closed);
    return closed;
  };

  const handleReopen = async (protocol) => {
    const reopened = { ...protocol, status: 'draft', closedAt: null };
    await handleSave(reopened);
    setCurrent(reopened);
  };

  const handleDelete = async (id) => {
    if (!confirm(`Opravdu smazat protokol ${id}? Akce je nevratná.`)) return;
    try {
      await storage.delete(`protocols:${id}`);
      showToast('Smazáno');
      await loadProtocols();
      if (view === 'form' && current?.id === id) {
        setView('list');
        setCurrent(null);
      }
    } catch (e) {
      showToast('Smazání selhalo', 'error');
    }
  };

  const filtered = useMemo(() => {
    if (!search.trim()) return protocols;
    const q = search.toLowerCase();
    return protocols.filter(p =>
      (p.id || '').toLowerCase().includes(q) ||
      (p.customer || '').toLowerCase().includes(q) ||
      (p.manufacturer || '').toLowerCase().includes(q) ||
      (p.model || '').toLowerCase().includes(q) ||
      (p.workDescription || '').toLowerCase().includes(q)
    );
  }, [protocols, search]);

  return (
    <div className="min-h-screen bg-slate-100">
      {/* Hlavička */}
      <header className="bg-slate-900 text-white shadow-md print:hidden sticky top-0 z-10">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
          <div className="w-10 h-10 bg-blue-600 flex items-center justify-center font-bold text-sm rounded shrink-0">LC</div>
          <div className="flex-1 min-w-0">
            <div className="font-bold text-lg leading-tight">LaundryCloud</div>
            <div className="text-xs text-slate-300">Servisní protokoly</div>
          </div>
          {view === 'form' && (
            <button
              onClick={() => { setView('list'); setCurrent(null); }}
              className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors"
            >
              <ArrowLeft className="w-4 h-4" /> Zpět
            </button>
          )}
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6 print:p-0 print:max-w-none">
        {loading ? (
          <div className="text-center py-20 text-slate-500">Načítám…</div>
        ) : view === 'list' ? (
          <ListView
            protocols={filtered}
            allCount={protocols.length}
            search={search}
            setSearch={setSearch}
            onNew={handleNew}
            onOpen={handleOpen}
            onDelete={handleDelete}
          />
        ) : (
          <FormView
            key={current?.id}
            protocol={current}
            onSave={handleSave}
            onClose={handleClose}
            onReopen={handleReopen}
            onDelete={handleDelete}
            showToast={showToast}
          />
        )}
      </main>

      {toast && (
        <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded shadow-lg text-white print:hidden z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// === Seznam protokolů ===
function ListView({ protocols, allCount, search, setSearch, onNew, onOpen, onDelete }) {
  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row gap-3">
        <button
          onClick={onNew}
          className="flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded shadow-sm transition-colors"
        >
          <Plus className="w-5 h-5" /> Nový protokol
        </button>
        <div className="relative flex-1">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
          <input
            type="text"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Hledat dle čísla, zákazníka, stroje…"
            className="w-full pl-10 pr-3 py-3 bg-white border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>

      {allCount === 0 ? (
        <div className="bg-white rounded-lg border border-slate-200 p-12 text-center">
          <FileText className="w-12 h-12 text-slate-300 mx-auto mb-3" />
          <h2 className="text-lg font-semibold text-slate-700 mb-1">Zatím žádné protokoly</h2>
          <p className="text-slate-500 mb-4">Vytvoř první servisní protokol kliknutím na tlačítko výše.</p>
        </div>
      ) : protocols.length === 0 ? (
        <div className="bg-white rounded-lg border border-slate-200 p-8 text-center text-slate-500">

function ProtocolCard({ protocol, onOpen, onDelete }) {
  const machine = [protocol.manufacturer, protocol.model].filter(Boolean).join(' ');
  return (
    <div className="bg-white rounded-lg border border-slate-200 hover:border-slate-300 transition-colors overflow-hidden">
      <button
        onClick={() => onOpen(protocol)}
        className="w-full p-4 text-left hover:bg-slate-50 transition-colors"
      >
        <div className="flex items-start justify-between gap-3 mb-2">
          <div className="font-mono font-bold text-slate-900 text-base">{protocol.id}</div>
          <StatusBadge status={protocol.status} />
        </div>
        <div className="text-sm text-slate-700 truncate">
          {protocol.customer || <span className="text-slate-400 italic">bez zákazníka</span>}
        </div>
        <div className="text-xs text-slate-500 mt-1 flex flex-wrap gap-x-3 gap-y-1">
          {machine && <span>{machine}</span>}
          {protocol.serviceDate && <span>{formatCZ(protocol.serviceDate)}</span>}
        </div>
      </button>
      <div className="border-t border-slate-100 px-4 py-2 flex justify-end">
        <button
          onClick={() => onDelete(protocol.id)}
          className="text-xs text-red-600 hover:text-red-700 flex items-center gap-1 px-2 py-1 rounded hover:bg-red-50"
        >
          <Trash2 className="w-3 h-3" /> Smazat
        </button>
      </div>
    </div>
  );
}

function StatusBadge({ status }) {
  if (status === 'closed') {
    return (
      <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-green-100 text-green-700 text-xs font-semibold rounded shrink-0">
        <Lock className="w-3 h-3" /> Uzavřeno
      </span>
    );
  }
  return (
    <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-100 text-amber-700 text-xs font-semibold rounded shrink-0">
      <Edit3 className="w-3 h-3" /> Koncept
    </span>
  );
}

// === Formulář protokolu ===
function FormView({ protocol, onSave, onClose, onReopen, onDelete, showToast }) {
  const [p, setP] = useState(protocol);
  const [dirty, setDirty] = useState(false);
  const [aresLoading, setAresLoading] = useState(false);
  const [aresError, setAresError] = useState('');
  const [signTarget, setSignTarget] = useState(null);
  const isClosed = p.status === 'closed';

  const update = (key, value) => {
    setP(prev => ({ ...prev, [key]: value }));
    setDirty(true);
  };

  const handleAresLookup = async () => {
    setAresError('');
    if (!validIco(p.ico)) {
      setAresError('Neplatné IČO — zadej 8 číslic.');
      return;
    }
    setAresLoading(true);
    let result = null;
    try {
      result = await fetchAres(p.ico);
    } catch (e) {
      // Přímé volání selhalo (nejspíš blokuje prostředí) — zkusíme záložní cestu
      try {
        result = await fetchAresFallback(p.ico);
      } catch (e2) {
        setAresError('Načtení se nezdařilo. Zkontroluj připojení nebo vyplň ručně.');
        setAresLoading(false);
        return;
      }
    }
    if (result.notFound) {
      setAresError('Firma s tímto IČO nebyla nalezena.');
    } else {
      setP(prev => ({
        ...prev,
        customer: result.customer || prev.customer,
        customerAddress: result.address || prev.customerAddress,
      }));
      setDirty(true);
      showToast('Údaje načteny z ARES');
    }
    setAresLoading(false);
  };

  const handleSaveClick = async () => {
    const ok = await onSave(p);
    if (ok) setDirty(false);
  };

  const handleCloseClick = async () => {
    if (!p.customer.trim()) {
      showToast('Doplň jméno zákazníka před uzavřením', 'error');
      return;
    }
    if (!confirm('Po uzavření už nepůjde protokol upravovat. Pokračovat?')) return;
    const closed = await onClose(p);
    setP(closed);
    setDirty(false);
  };

  const handleSendEmail = async () => {
    if (dirty) {
      const ok = await onSave(p);
      if (!ok) return;
      setDirty(false);
    }
    const subject = `Servisní protokol ${p.id}${p.customer ? ' - ' + p.customer : ''}`;
    const body = `Dobrý den,\n\nv příloze zasílám servisní protokol ${p.id} ze dne ${formatCZ(p.serviceDate)}.\n\nProtokol je třeba stáhnout jako PDF tlačítkem „Export PDF" a přiložit k tomuto e-mailu.\n\nS pozdravem,\n${TECHNICIAN_NAME}\n${COMPANY_NAME}\n${COMPANY_ADDRESS}`;
    const to = encodeURIComponent(p.email || '');
    const cc = encodeURIComponent(COMPANY_EMAIL);
    const su = encodeURIComponent(subject);
    const bo = encodeURIComponent(body);
    const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${to}&cc=${cc}&su=${su}&body=${bo}`;
    window.open(url, '_blank');
    showToast('Gmail otevřen — přilož PDF ručně');
  };

  const handleExportPDF = () => {
    window.print();
  };

// Modální okno s plátnem pro nakreslení podpisu (myš i dotyk)
function SignaturePad({ title, onSave, onClose }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef({ x: 0, y: 0 });
  const [hasInk, setHasInk] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    const ctx = canvas.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1e293b';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, rect.width, rect.height);
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };

  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    last.current = getPos(e);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext('2d');
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    last.current = pos;
    if (!hasInk) setHasInk(true);
  };
  const end = (e) => {
    if (e) e.preventDefault();
    drawing.current = false;
  };

  const clear = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, rect.width, rect.height);
    setHasInk(false);
  };

  const save = () => {
    if (!hasInk) { onClose(); return; }
    onSave(canvasRef.current.toDataURL('image/png'));
  };

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 print:hidden">
      <div className="bg-white rounded-lg shadow-xl w-full max-w-lg">
        <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
          <div className="font-semibold text-slate-800">{title}</div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
            <X className="w-5 h-5" />
          </button>
        </div>
        <div className="p-4">
          <canvas
            ref={canvasRef}
            className="w-full h-48 border-2 border-dashed border-slate-300 rounded bg-white cursor-crosshair"
            style={{ touchAction: 'none' }}
            onMouseDown={start}
            onMouseMove={move}
            onMouseUp={end}
            onMouseLeave={end}
            onTouchStart={start}
            onTouchMove={move}
            onTouchEnd={end}
          />
          <p className="text-xs text-slate-500 mt-2 text-center">Podepiš se prstem nebo myší</p>
        </div>
        <div className="px-4 py-3 border-t border-slate-200 flex justify-between gap-2">
          <button onClick={clear} className="px-3 py-2 text-slate-600 hover:bg-slate-100 rounded text-sm">
            Vymazat
          </button>
          <div className="flex gap-2">
            <button onClick={onClose} className="px-3 py-2 text-slate-600 hover:bg-slate-100 rounded text-sm">
              Zrušit
            </button>
            <button onClick={save} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">
              Uložit podpis
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function IcoField({ value, onChange, onLookup, loading, error, readOnly }) {

    if (e.key === 'Enter' && !readOnly && value && value.length === 8) {
      e.preventDefault();
      onLookup();
    }
  };
  return (
    <div>
      <label className="block text-xs font-medium text-slate-600 mb-1">IČO</label>
      <div className="flex gap-2">
        <input
          type="text"
          inputMode="numeric"
          value={value || ''}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          readOnly={readOnly}
          placeholder="8 číslic"
          className={`flex-1 min-w-0 px-3 py-2 border border-slate-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${readOnly ? 'bg-slate-50 text-slate-700' : 'bg-white'}`}
        />
        {!readOnly && (
          <button
            type="button"
            onClick={onLookup}
            disabled={loading || (value || '').length !== 8}
            title="Načíst název a adresu z registru ARES"
            className="shrink-0 flex items-center gap-1.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed text-slate-700 rounded text-sm font-medium transition-colors"
          >
            {loading ? <Loader2 className="w-4 h-4 animate-spin" /> : <Building2 className="w-4 h-4" />}
            <span className="hidden sm:inline">ARES</span>
          </button>
        )}
      </div>
      {error && <div className="text-xs text-red-600 mt-1">{error}</div>}
      {!readOnly && (value || '').length === 8 && (
        <button
          type="button"
          onClick={() => window.open(`https://ares.gov.cz/ekonomicke-subjekty?ico=${value}`, '_blank')}
          className="text-xs text-blue-600 hover:text-blue-700 mt-1 print:hidden"

                  <td className="p-1"><input className={`w-full px-2 py-1 border border-slate-200 rounded ${readOnly ? 'bg-slate-50' : 'bg-white'}`} value={part.code} onChange={e => updateRow(idx, 'code', e.target.value)} readOnly={readOnly} /></td>

      )}
      {!readOnly && (
        <button onClick={add} className="mt-2 text-sm text-blue-600 hover:text-blue-700 flex items-center gap-1 print:hidden">
          <Plus className="w-4 h-4" /> Přidat díl
        </button>
      )}
    </div>
  );
}

function TrainedPersonsTable({ persons, onChange, readOnly }) {
  const add = () => onChange([...(persons || []), { name: '', position: '', date: todayISO(), signature: '' }]);
  const remove = (idx) => onChange(persons.filter((_, i) => i !== idx));
  const updateRow = (idx, key, val) => {
    const next = [...persons];
    next[idx] = { ...next[idx], [key]: val };
    onChange(next);
  };

  return (
    <div className="mt-4">
      <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide mb-2">Školené osoby</div>
      {(!persons || persons.length === 0) ? (
        <div className="text-sm text-slate-400 italic py-2">Žádné osoby</div>
      ) : (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-100 text-slate-700">
                <th className="text-left px-2 py-1.5 font-semibold">Jméno a příjmení</th>
                <th className="text-left px-2 py-1.5 font-semibold">Pozice</th>
                <th className="text-left px-2 py-1.5 font-semibold">Datum</th>
                <th className="text-left px-2 py-1.5 font-semibold">Podpis</th>
                {!readOnly && <th className="w-10 print:hidden"></th>}
              </tr>
            </thead>
            <tbody>
              {persons.map((person, idx) => (
                <tr key={idx} className="border-b border-slate-100">
                  <td className="p-1"><input className={`w-full px-2 py-1 border border-slate-200 rounded ${readOnly ? 'bg-slate-50' : 'bg-white'}`} value={person.name} onChange={e => updateRow(idx, 'name', e.target.value)} readOnly={readOnly} /></td>
                  <td className="p-1"><input className={`w-full px-2 py-1 border border-slate-200 rounded ${readOnly ? 'bg-slate-50' : 'bg-white'}`} value={person.position} onChange={e => updateRow(idx, 'position', e.target.value)} readOnly={readOnly} /></td>
                  <td className="p-1"><input type="date" className={`w-full px-2 py-1 border border-slate-200 rounded ${readOnly ? 'bg-slate-50' : 'bg-white'}`} value={person.date} onChange={e => updateRow(idx, 'date', e.target.value)} readOnly={readOnly} /></td>
                  <td className="p-1"><input className={`w-full px-2 py-1 border border-slate-200 rounded ${readOnly ? 'bg-slate-50' : 'bg-white'}`} value={person.signature} onChange={e => updateRow(idx, 'signature', e.target.value)} readOnly={readOnly} placeholder="podpis / iniciály" /></td>
                  {!readOnly && (
                    <td className="p-1 print:hidden">
                      <button onClick={() => remove(idx)} className="text-red-600 hover:bg-red-50 p-1 rounded">
                        <X className="w-4 h-4" />
                      </button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {!readOnly && (
        <button onClick={add} className="mt-2 text-sm text-blue-600 hover:text-blue-700 flex items-center gap-1 print:hidden">
          <Plus className="w-4 h-4" /> Přidat osobu
        </button>
      )}
    </div>
  );
}

function PhotoSection({ label, photos, onAdd, onRemove, readOnly }) {
  const fileRef = useRef(null);
  const handleFiles = async (files) => {
    for (const f of Array.from(files)) {
      if (f.type.startsWith('image/')) {
        await onAdd(f);
      }
    }
    if (fileRef.current) fileRef.current.value = '';
  };

  return (
    <div className="mb-5 last:mb-0">
      <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide mb-2">{label}</div>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
        {(photos || []).map((src, idx) => (
          <div key={idx} className="relative aspect-square bg-slate-100 rounded overflow-hidden group">
            <img src={src} alt="" className="w-full h-full object-cover" />
            {!readOnly && (
              <button
                onClick={() => onRemove(idx)}
                className="absolute top-1 right-1 bg-red-600 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity print:hidden"
                aria-label="Odstranit fotku"
              >
                <X className="w-3 h-3" />
              </button>
            )}
          </div>
        ))}
        {!readOnly && (
          <button
            onClick={() => fileRef.current?.click()}
            className="aspect-square border-2 border-dashed border-slate-300 hover:border-blue-500 hover:bg-blue-50 rounded flex flex-col items-center justify-center text-slate-500 hover:text-blue-600 transition-colors print:hidden"
          >
            <Camera className="w-6 h-6 mb-1" />
            <span className="text-xs">Přidat fotku</span>
          </button>
        )}
      </div>
      <input
        ref={fileRef}
        type="file"
        accept="image/*"
        multiple
        onChange={(e) => handleFiles(e.target.files)}
        className="hidden"
      />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
